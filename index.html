<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>自用日曆</title>
  <style>
:root {
  --bg: #eef5ff;
  --ink: #1f2742;
  --ink-soft: #3d4666;
  --muted: #717895;
  --faint: #a9afc7;
  --paper: #fbfdff;
  --paper-soft: #f3f6ff;
  --glass: rgba(251, 253, 255, 0.82);
  --glass-strong: rgba(251, 253, 255, 0.95);
  --line: rgba(64, 72, 115, 0.13);
  --line-strong: rgba(64, 72, 115, 0.24);
  --accent: #7388df;
  --accent-strong: #4658a8;
  --accent-soft: #e7ecff;
  --gold: #7f8fe8;
  --gold-soft: #eef2ff;
  --wine: #9b5ca8;
  --blue: #6fa8dc;
  --violet: #9578d7;
  --amber: #6f8edb;
  --radius: 8px;
  --shadow-xl: 0 30px 90px rgba(65, 78, 135, 0.2);
  --shadow-md: 0 16px 38px rgba(65, 78, 135, 0.13);
  --shadow-sm: 0 8px 20px rgba(65, 78, 135, 0.09);
}

* {
  box-sizing: border-box;
}

html {
  min-width: 320px;
}

body {
  margin: 0;
  min-height: 100vh;
  color: var(--ink);
  background:
    linear-gradient(125deg, rgba(176, 211, 255, 0.76), transparent 34%),
    linear-gradient(245deg, rgba(213, 195, 255, 0.72), transparent 38%),
    linear-gradient(180deg, #f8fbff 0%, #eef4ff 48%, #f4efff 100%);
  font-family: "Microsoft JhengHei", "PingFang TC", "Noto Sans TC", Arial, sans-serif;
}

body::before {
  position: fixed;
  inset: 0;
  pointer-events: none;
  content: "";
  background:
    linear-gradient(90deg, rgba(70, 88, 168, 0.035) 1px, transparent 1px),
    linear-gradient(rgba(70, 88, 168, 0.03) 1px, transparent 1px);
  background-size: 42px 42px;
  mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.72), transparent 76%);
}

button,
input,
select,
textarea {
  font: inherit;
}

button {
  cursor: pointer;
}

.app-shell {
  position: relative;
  display: block;
  width: min(1500px, 100%);
  min-height: 100vh;
  margin: 0 auto;
  padding: 28px;
}

body.modal-open {
  overflow: hidden;
}

.calendar-panel,
.detail-sheet {
  position: relative;
  overflow: hidden;
  border: 1px solid rgba(255, 255, 255, 0.76);
  border-radius: var(--radius);
  background: var(--glass);
  box-shadow: var(--shadow-xl);
  backdrop-filter: blur(22px);
}

.calendar-panel::before,
.detail-sheet::before {
  position: absolute;
  inset: 0;
  pointer-events: none;
  content: "";
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.72), transparent 34%),
    linear-gradient(120deg, rgba(190, 222, 255, 0.4), transparent 36%, transparent 64%, rgba(215, 198, 255, 0.44));
}

.calendar-panel {
  display: flex;
  flex-direction: column;
  min-width: 0;
  padding: 28px;
}

.detail-panel {
  position: fixed;
  inset: 0;
  z-index: 15;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 22px;
  background: rgba(37, 43, 78, 0.34);
  backdrop-filter: blur(10px);
}

.detail-panel.is-open {
  display: flex;
}

.detail-sheet {
  display: flex;
  flex-direction: column;
  gap: 18px;
  width: min(560px, 100%);
  max-height: min(880px, calc(100vh - 44px));
  min-width: 0;
  padding: 24px;
  overflow-y: auto;
}

.calendar-panel > *,
.detail-sheet > * {
  position: relative;
}

.topbar,
.detail-header,
.month-title,
.section-title {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}

.brand-block {
  display: flex;
  align-items: center;
  gap: 15px;
  min-width: 0;
}

.brand-mark {
  position: relative;
  flex: 0 0 auto;
  width: 52px;
  height: 52px;
  border: 1px solid rgba(115, 136, 223, 0.48);
  border-radius: var(--radius);
  background:
    linear-gradient(145deg, rgba(255, 255, 255, 0.82), rgba(255, 255, 255, 0.2)),
    linear-gradient(135deg, #dff0ff, #efe8ff);
  box-shadow:
    inset 0 1px 0 rgba(255, 255, 255, 0.9),
    0 14px 28px rgba(70, 88, 168, 0.16);
}

.brand-mark::before,
.brand-mark::after {
  position: absolute;
  content: "";
}

.brand-mark::before {
  inset: 13px 12px 11px;
  border: 2px solid var(--accent-strong);
  border-top-width: 8px;
  border-radius: 6px;
}

.brand-mark::after {
  left: 17px;
  right: 17px;
  top: 28px;
  height: 2px;
  background: var(--accent);
  box-shadow: 0 7px 0 var(--violet);
}

.eyebrow {
  margin: 0 0 7px;
  color: var(--accent-strong);
  font-size: 0.74rem;
  font-weight: 900;
  letter-spacing: 0;
  text-transform: uppercase;
}

h1,
h2,
h3,
h4,
p {
  margin-top: 0;
}

h1 {
  margin-bottom: 0;
  color: var(--ink);
  font-size: clamp(2rem, 4vw, 3.25rem);
  line-height: 1;
  font-weight: 900;
}

h2 {
  margin-bottom: 0;
  color: var(--ink);
  font-size: 1.45rem;
  line-height: 1.28;
}

h3 {
  margin-bottom: 14px;
  color: var(--ink-soft);
  font-size: 1rem;
  line-height: 1.2;
}

.month-controls,
.form-actions,
.event-actions {
  display: flex;
  align-items: center;
  gap: 10px;
}

.month-controls {
  padding: 5px;
  border: 1px solid rgba(21, 24, 22, 0.08);
  border-radius: var(--radius);
  background: rgba(255, 254, 250, 0.66);
  box-shadow:
    inset 0 1px 0 rgba(255, 255, 255, 0.82),
    0 10px 24px rgba(21, 24, 22, 0.06);
}

.icon-button,
.today-button,
.primary-button,
.secondary-button,
.danger-button {
  min-height: 42px;
  border: 1px solid transparent;
  border-radius: var(--radius);
  transition:
    transform 160ms ease,
    background 160ms ease,
    border-color 160ms ease,
    box-shadow 160ms ease;
}

.icon-button {
  display: grid;
  width: 44px;
  place-items: center;
  color: var(--ink);
  background: transparent;
  font-size: 1.7rem;
  line-height: 1;
}

.today-button,
.secondary-button {
  color: var(--ink);
  background: rgba(255, 255, 255, 0.72);
  border-color: var(--line);
}

.today-button {
  padding: 0 18px;
  font-weight: 900;
}

.primary-button {
  padding: 0 18px;
  color: #fff;
  background: linear-gradient(180deg, #8fa2f5, var(--accent-strong));
  box-shadow: 0 16px 30px rgba(70, 88, 168, 0.24);
  font-weight: 900;
}

.secondary-button,
.danger-button {
  padding: 0 14px;
  font-weight: 900;
}

.danger-button {
  color: #fff;
  background: linear-gradient(180deg, #b47bdd, var(--wine));
  box-shadow: 0 12px 22px rgba(155, 92, 168, 0.18);
}

.compact {
  min-height: 34px;
  padding: 0 12px;
  font-size: 0.88rem;
}

button:hover {
  transform: translateY(-1px);
  box-shadow: var(--shadow-sm);
}

.icon-button:hover {
  background: rgba(255, 255, 255, 0.78);
}

button:active {
  transform: translateY(0);
}

button:focus-visible,
input:focus-visible,
select:focus-visible,
textarea:focus-visible {
  outline: 3px solid rgba(115, 136, 223, 0.28);
  outline-offset: 2px;
}

.month-title {
  margin: 28px 0 16px;
  padding: 18px 0 0;
  border-top: 1px solid var(--line);
}

.month-title > div {
  min-width: 0;
}

.month-title h2 {
  font-size: 1.66rem;
  font-weight: 900;
}

.month-jump {
  display: grid;
  flex: 0 0 170px;
  gap: 7px;
  color: var(--muted);
  font-size: 0.82rem;
  font-weight: 900;
}

.month-jump input {
  height: 38px;
  background: rgba(255, 255, 255, 0.72);
}

.month-title p {
  margin-bottom: 0;
  color: var(--muted);
  font-weight: 900;
}

.weekday-row,
.calendar-grid {
  display: grid;
  grid-template-columns: repeat(7, minmax(0, 1fr));
}

.weekday-row {
  gap: 8px;
  margin-bottom: 9px;
  color: var(--muted);
  font-size: 0.83rem;
  font-weight: 900;
  text-align: center;
}

.weekday-row span {
  padding: 8px 0;
  border: 1px solid rgba(255, 255, 255, 0.56);
  border-radius: var(--radius);
  background: rgba(255, 255, 255, 0.46);
}

.calendar-grid {
  flex: 1;
  gap: 8px;
}

.day-cell {
  position: relative;
  display: flex;
  flex-direction: column;
  min-height: 124px;
  padding: 11px;
  overflow: hidden;
  color: var(--ink);
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(255, 254, 250, 0.82)),
    var(--paper);
  border: 1px solid rgba(21, 24, 22, 0.1);
  border-radius: var(--radius);
  box-shadow: 0 6px 18px rgba(21, 24, 22, 0.045);
  text-align: left;
}

.day-cell::before {
  position: absolute;
  inset: 0 0 auto;
  height: 3px;
  content: "";
  background: transparent;
}

.day-cell::after {
  position: absolute;
  right: 8px;
  bottom: 8px;
  width: 28px;
  height: 1px;
  content: "";
  background: rgba(115, 136, 223, 0.28);
}

.day-cell.is-muted {
  color: var(--faint);
  background: rgba(255, 255, 255, 0.4);
  box-shadow: none;
}

.day-cell.is-today {
  border-color: rgba(115, 136, 223, 0.62);
}

.day-cell.is-today::before {
  background: linear-gradient(90deg, #7fb5ff, #b69cff);
}

.day-cell.is-selected {
  background:
    linear-gradient(180deg, rgba(231, 236, 255, 0.92), rgba(251, 253, 255, 0.9)),
    var(--accent-soft);
  border-color: rgba(70, 88, 168, 0.48);
  box-shadow:
    inset 0 0 0 1px rgba(70, 88, 168, 0.12),
    0 16px 32px rgba(70, 88, 168, 0.13);
}

.day-number {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 10px;
  font-size: 1rem;
  font-weight: 900;
}

.event-badge {
  min-width: 26px;
  padding: 4px 8px;
  color: #fff;
  background: linear-gradient(180deg, #9ab6ff, #7868d9);
  border: 1px solid rgba(255, 255, 255, 0.36);
  border-radius: 999px;
  box-shadow: 0 8px 16px rgba(120, 104, 217, 0.2);
  font-size: 0.76rem;
  text-align: center;
}

.day-preview {
  display: grid;
  gap: 6px;
  color: var(--muted);
  font-size: 0.82rem;
}

.preview-line {
  overflow: hidden;
  padding: 5px 7px;
  border: 1px solid rgba(21, 24, 22, 0.05);
  border-radius: 7px;
  background: rgba(255, 255, 255, 0.68);
  text-overflow: ellipsis;
  white-space: nowrap;
}

.detail-title-block {
  min-width: 0;
}

.detail-actions {
  display: flex;
  flex: 0 0 auto;
  align-items: center;
  gap: 8px;
}

.close-button {
  width: 38px;
  min-height: 38px;
  font-size: 1.25rem;
}

.count-pill {
  flex: 0 0 auto;
  padding: 8px 12px;
  color: var(--accent-strong);
  background: linear-gradient(180deg, var(--accent-soft), rgba(255, 255, 255, 0.78));
  border: 1px solid rgba(115, 136, 223, 0.2);
  border-radius: 999px;
  font-size: 0.88rem;
  font-weight: 900;
}

.form-panel,
.events-section {
  padding-top: 18px;
  border-top: 1px solid var(--line);
}

.form-panel[hidden],
.events-section[hidden] {
  display: none;
}

.form-panel {
  padding: 18px;
  border: 1px solid rgba(21, 24, 22, 0.09);
  border-radius: var(--radius);
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.62), rgba(255, 255, 255, 0.34)),
    rgba(255, 255, 255, 0.48);
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.66);
}

.form-date {
  margin: -4px 0 14px;
  color: var(--muted);
  font-size: 0.88rem;
  font-weight: 800;
}

form {
  display: grid;
  gap: 13px;
}

label {
  display: grid;
  gap: 7px;
  color: var(--muted);
  font-size: 0.88rem;
  font-weight: 900;
}

input,
select,
textarea {
  width: 100%;
  color: var(--ink);
  background: rgba(255, 255, 255, 0.88);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  box-shadow: inset 0 1px 2px rgba(21, 24, 22, 0.04);
}

input:disabled {
  color: var(--faint);
  background: rgba(255, 255, 255, 0.46);
  cursor: not-allowed;
}

input,
select {
  height: 44px;
  padding: 0 12px;
}

textarea {
  resize: vertical;
  min-height: 112px;
  padding: 11px 12px;
}

input::placeholder,
textarea::placeholder {
  color: #a4a79f;
}

.two-column {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.check-row {
  display: flex;
  align-items: center;
  gap: 10px;
  width: fit-content;
  color: var(--ink-soft);
  cursor: pointer;
}

.check-row input {
  width: 20px;
  height: 20px;
  accent-color: var(--accent);
  box-shadow: none;
}

.event-list {
  display: grid;
  gap: 12px;
}

.empty-state {
  margin: 0;
  padding: 18px;
  color: var(--muted);
  background: rgba(255, 255, 255, 0.62);
  border: 1px dashed var(--line-strong);
  border-radius: var(--radius);
  cursor: pointer;
  text-align: center;
}

.empty-state strong {
  display: block;
  margin-bottom: 6px;
  color: var(--ink);
}

.toast {
  position: fixed;
  right: 24px;
  bottom: 24px;
  z-index: 20;
  max-width: min(360px, calc(100vw - 32px));
  padding: 12px 14px;
  color: #fff;
  background: linear-gradient(180deg, #8fa2f5, var(--accent-strong));
  border: 1px solid rgba(255, 255, 255, 0.22);
  border-radius: var(--radius);
  box-shadow: var(--shadow-md);
  font-weight: 900;
  opacity: 0;
  pointer-events: none;
  transform: translateY(10px);
  transition: opacity 180ms ease, transform 180ms ease;
}

.toast.is-visible {
  opacity: 1;
  transform: translateY(0);
}

.event-card {
  display: grid;
  grid-template-columns: 8px 1fr;
  overflow: hidden;
  background: rgba(255, 255, 255, 0.76);
  border: 1px solid rgba(21, 24, 22, 0.1);
  border-radius: var(--radius);
  box-shadow: 0 10px 24px rgba(21, 24, 22, 0.07);
}

.event-color {
  background: linear-gradient(180deg, #91c4ff, #a78de8);
}

.event-content {
  min-width: 0;
  padding: 14px;
}

.event-meta {
  margin-bottom: 7px;
  color: var(--accent-strong);
  font-size: 0.8rem;
  font-weight: 900;
}

.event-content h4 {
  margin-bottom: 8px;
  color: var(--ink);
  font-size: 1.02rem;
  line-height: 1.32;
  overflow-wrap: anywhere;
}

.event-content p {
  margin-bottom: 13px;
  color: var(--muted);
  line-height: 1.58;
  white-space: pre-wrap;
  overflow-wrap: anywhere;
}

@media (max-width: 980px) {
  .app-shell {
    width: 100%;
  }
}

@media (max-width: 640px) {
  body {
    min-height: 100svh;
  }

  .app-shell {
    min-height: 100svh;
    padding: 8px;
  }

  .calendar-panel {
    min-height: calc(100svh - 16px);
    padding: 10px;
  }

  .detail-sheet {
    padding: 15px;
  }

  .detail-panel {
    align-items: center;
    justify-content: center;
    padding: 14px;
  }

  .detail-sheet {
    width: min(100%, 430px);
    max-height: 82svh;
    border-radius: var(--radius);
  }

  .topbar,
  .detail-header {
    align-items: flex-start;
    flex-direction: column;
  }

  .topbar {
    margin-bottom: 8px;
  }

  .brand-block {
    display: none;
  }

  .month-title {
    align-items: center;
    flex-direction: row;
    gap: 8px;
    margin: 8px 0;
    padding-top: 8px;
  }

  .month-title h2 {
    font-size: 1.45rem;
  }

  .month-title p {
    display: none;
  }

  .month-jump {
    flex: 0 0 132px;
    font-size: 0;
  }

  .month-jump input {
    height: 36px;
    padding: 0 8px;
    font-size: 0.92rem;
  }

  .month-jump,
  .detail-actions {
    width: 100%;
  }

  .detail-actions {
    justify-content: space-between;
  }

  .month-controls {
    width: 100%;
    padding: 4px;
  }

  .today-button {
    flex: 1;
    min-height: 38px;
  }

  .icon-button {
    width: 40px;
    min-height: 38px;
  }

  .weekday-row {
    gap: 4px;
    margin-bottom: 4px;
    font-size: 0.78rem;
  }

  .weekday-row span {
    padding: 6px 0;
  }

  .calendar-grid {
    gap: 4px;
  }

  .day-cell {
    min-height: 72px;
    padding: 6px;
  }

  .day-number {
    margin-bottom: 5px;
    font-size: 0.9rem;
  }

  .event-badge {
    min-width: 20px;
    padding: 2px 5px;
    font-size: 0.68rem;
  }

  .day-preview {
    display: grid;
    gap: 3px;
    font-size: 0.68rem;
  }

  .preview-line {
    padding: 2px 4px;
    border-radius: 5px;
  }

  .two-column {
    grid-template-columns: 1fr;
  }

  .form-actions,
  .event-actions {
    align-items: stretch;
    flex-direction: column;
  }

  .toast {
    right: 12px;
    bottom: 12px;
  }

}

  </style>
</head>
<body>
  <main class="app-shell">
    <section class="calendar-panel" aria-label="月曆">
      <header class="topbar">
        <div class="brand-block">
          <span class="brand-mark" aria-hidden="true"></span>
          <div>
            <p class="eyebrow">Private Atelier</p>
            <h1>通勤用日曆</h1>
          </div>
        </div>
        <div class="month-controls" aria-label="月份控制">
          <button class="icon-button" id="prevMonth" type="button" aria-label="上一個月" title="上一個月">‹</button>
          <button class="today-button" id="todayButton" type="button">今天</button>
          <button class="icon-button" id="nextMonth" type="button" aria-label="下一個月" title="下一個月">›</button>
        </div>
      </header>

      <div class="month-title">
        <div>
          <h2 id="monthLabel"></h2>
          <p id="monthSummary"></p>
        </div>
        <label class="month-jump">
          跳到月份
          <input id="jumpMonth" type="month">
        </label>
      </div>

      <div class="weekday-row" aria-hidden="true">
        <span>日</span>
        <span>一</span>
        <span>二</span>
        <span>三</span>
        <span>四</span>
        <span>五</span>
        <span>六</span>
      </div>
      <div class="calendar-grid" id="calendarGrid"></div>
    </section>

    <aside class="detail-panel" id="detailPanel" aria-label="日期活動詳細頁" aria-hidden="true">
      <div class="detail-sheet" role="dialog" aria-modal="true" aria-labelledby="selectedDateLabel">
        <header class="detail-header">
          <div class="detail-title-block">
            <p class="eyebrow">Selected Date</p>
            <h2 id="selectedDateLabel"></h2>
          </div>
          <div class="detail-actions">
            <button class="secondary-button compact" type="button" id="focusEventButton">新增</button>
            <span class="count-pill" id="selectedCount">0 筆</span>
            <button class="icon-button close-button" type="button" id="closeDetailButton" aria-label="關閉詳細頁" title="關閉">×</button>
          </div>
        </header>

        <section class="form-panel" id="formPanel" aria-label="新增或編輯活動" hidden>
          <div class="section-title">
            <h3 id="formTitle">新增活動</h3>
            <button class="secondary-button compact" type="button" id="backToEventsButton">返回活動</button>
          </div>
          <p class="form-date" id="formDateText"></p>
          <form id="eventForm">
            <input type="hidden" id="editingId">
            <label>
              活動名稱
              <input id="eventTitle" type="text" maxlength="80" required placeholder="例如：看牙醫">
            </label>
            <div class="two-column">
              <label>
                開始時間
                <input id="eventStartTime" class="time-input" type="text" inputmode="numeric" maxlength="5" placeholder="例如 0930">
              </label>
              <label>
                結束時間
                <input id="eventEndTime" class="time-input" type="text" inputmode="numeric" maxlength="5" placeholder="例如 1800">
              </label>
            </div>
            <label class="check-row">
              <input id="eventAllDay" type="checkbox">
              <span>整天活動</span>
            </label>
            <label>
              詳細內容
              <textarea id="eventNotes" rows="5" placeholder="地點、備註、要準備的東西..."></textarea>
            </label>
            <div class="form-actions">
              <button class="primary-button" type="submit" id="saveButton">儲存活動</button>
              <button class="secondary-button" type="button" id="cancelEditButton" hidden>取消編輯</button>
            </div>
          </form>
        </section>

        <section class="events-section" id="eventsPanel" aria-label="當日活動">
          <div class="section-title">
            <h3>當日活動</h3>
            <button class="secondary-button compact" type="button" id="exportButton">備份</button>
          </div>
          <div class="event-list" id="eventList"></div>
        </section>
      </div>
    </aside>
  </main>

  <template id="eventTemplate">
    <article class="event-card">
      <div class="event-color"></div>
      <div class="event-content">
        <div class="event-meta"></div>
        <h4></h4>
        <p></p>
        <div class="event-actions">
          <button class="secondary-button compact edit-event" type="button">編輯</button>
          <button class="danger-button compact delete-event" type="button">刪除</button>
        </div>
      </div>
    </article>
  </template>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script>
const STORAGE_KEY = "personal-calendar-events-v1";

const monthLabel = document.querySelector("#monthLabel");
const monthSummary = document.querySelector("#monthSummary");
const calendarGrid = document.querySelector("#calendarGrid");
const detailPanel = document.querySelector("#detailPanel");
const selectedDateLabel = document.querySelector("#selectedDateLabel");
const selectedCount = document.querySelector("#selectedCount");
const jumpMonth = document.querySelector("#jumpMonth");
const eventList = document.querySelector("#eventList");
const formPanel = document.querySelector("#formPanel");
const eventsPanel = document.querySelector("#eventsPanel");
const eventForm = document.querySelector("#eventForm");
const editingId = document.querySelector("#editingId");
const eventTitle = document.querySelector("#eventTitle");
const eventStartTime = document.querySelector("#eventStartTime");
const eventEndTime = document.querySelector("#eventEndTime");
const eventAllDay = document.querySelector("#eventAllDay");
const eventNotes = document.querySelector("#eventNotes");
const formTitle = document.querySelector("#formTitle");
const formDateText = document.querySelector("#formDateText");
const saveButton = document.querySelector("#saveButton");
const cancelEditButton = document.querySelector("#cancelEditButton");
const backToEventsButton = document.querySelector("#backToEventsButton");
const focusEventButton = document.querySelector("#focusEventButton");
const closeDetailButton = document.querySelector("#closeDetailButton");
const toast = document.querySelector("#toast");
const eventTemplate = document.querySelector("#eventTemplate");

const today = new Date();
let visibleDate = new Date(today.getFullYear(), today.getMonth(), 1);
let selectedDate = toDateKey(today);
let events = loadEvents();

document.querySelector("#prevMonth").addEventListener("click", () => changeMonth(-1));
document.querySelector("#nextMonth").addEventListener("click", () => changeMonth(1));
document.querySelector("#todayButton").addEventListener("click", goToday);
document.querySelector("#exportButton").addEventListener("click", exportBackup);
jumpMonth.addEventListener("change", jumpToMonth);
focusEventButton.addEventListener("click", focusNewEvent);
closeDetailButton.addEventListener("click", closeDetail);
detailPanel.addEventListener("click", handleOverlayClick);
eventAllDay.addEventListener("change", syncAllDayFields);
[eventStartTime, eventEndTime].forEach((input) => {
  input.addEventListener("blur", () => normalizeTimeField(input));
});
cancelEditButton.addEventListener("click", resetForm);
backToEventsButton.addEventListener("click", showEventsView);
eventForm.addEventListener("submit", saveEvent);
document.addEventListener("keydown", handleShortcuts);

render();

function loadEvents() {
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
    return Array.isArray(saved) ? saved : [];
  } catch {
    return [];
  }
}

function persistEvents() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(events));
}

function changeMonth(offset) {
  visibleDate = new Date(visibleDate.getFullYear(), visibleDate.getMonth() + offset, 1);
  render();
}

function goToday() {
  visibleDate = new Date(today.getFullYear(), today.getMonth(), 1);
  selectedDate = toDateKey(today);
  resetForm();
  render();
}

function jumpToMonth() {
  if (!jumpMonth.value) return;
  const [year, month] = jumpMonth.value.split("-").map(Number);
  visibleDate = new Date(year, month - 1, 1);
  selectedDate = `${year}-${pad(month)}-01`;
  resetForm();
  render();
}

function render() {
  renderMonthHeader();
  renderCalendar();
  renderDetails();
}

function renderMonthHeader() {
  const year = visibleDate.getFullYear();
  const month = visibleDate.getMonth() + 1;
  const monthEvents = events.filter((event) => event.date.startsWith(`${year}-${pad(month)}-`));
  monthLabel.textContent = `${year} 年 ${month} 月`;
  monthSummary.textContent = `${monthEvents.length} 筆活動`;
  jumpMonth.value = `${year}-${pad(month)}`;
}

function renderCalendar() {
  calendarGrid.innerHTML = "";
  const year = visibleDate.getFullYear();
  const month = visibleDate.getMonth();
  const startDay = new Date(year, month, 1).getDay();
  const gridStart = new Date(year, month, 1 - startDay);

  for (let index = 0; index < 42; index += 1) {
    const cellDate = new Date(gridStart);
    cellDate.setDate(gridStart.getDate() + index);
    const dateKey = toDateKey(cellDate);
    const dayEvents = getEventsForDate(dateKey);

    const button = document.createElement("button");
    button.type = "button";
    button.className = "day-cell";
    button.setAttribute("aria-label", `${formatFullDate(dateKey)}，${dayEvents.length} 筆活動`);
    if (cellDate.getMonth() !== month) button.classList.add("is-muted");
    if (dateKey === toDateKey(today)) button.classList.add("is-today");
    if (dateKey === selectedDate) button.classList.add("is-selected");

    button.innerHTML = `
      <span class="day-number">
        <span>${cellDate.getDate()}</span>
        ${dayEvents.length ? `<span class="event-badge">${dayEvents.length}</span>` : ""}
      </span>
      <span class="day-preview"></span>
    `;

    const preview = button.querySelector(".day-preview");
    dayEvents.slice(0, 3).forEach((event) => {
      const line = document.createElement("span");
      line.className = "preview-line";
      line.textContent = event.title;
      line.title = `${formatEventTime(event)} ${event.title}`;
      preview.append(line);
    });

    button.addEventListener("click", () => {
      selectedDate = dateKey;
      if (cellDate.getMonth() !== visibleDate.getMonth()) {
        visibleDate = new Date(cellDate.getFullYear(), cellDate.getMonth(), 1);
      }
      resetForm();
      render();
      openDetail();
      showEventsView();
    });

    calendarGrid.append(button);
  }
}

function renderDetails() {
  const dayEvents = getEventsForDate(selectedDate);
  selectedDateLabel.textContent = formatFullDate(selectedDate);
  selectedCount.textContent = `${dayEvents.length} 筆`;
  formDateText.textContent = `活動會儲存在 ${formatShortDate(selectedDate)}`;
  eventList.innerHTML = "";

  if (!dayEvents.length) {
    const empty = document.createElement("p");
    empty.className = "empty-state";
    empty.innerHTML = "<strong>這一天還沒有活動</strong>新增第一筆活動後，會顯示在這裡。";
    empty.addEventListener("click", focusNewEvent);
    eventList.append(empty);
    return;
  }

  dayEvents.forEach((event) => {
    const node = eventTemplate.content.firstElementChild.cloneNode(true);
    node.querySelector(".event-meta").textContent = formatEventTime(event);
    node.querySelector("h4").textContent = event.title;
    node.querySelector("p").textContent = event.notes || "沒有填寫詳細內容。";
    node.querySelector(".edit-event").addEventListener("click", () => editEvent(event.id));
    node.querySelector(".delete-event").addEventListener("click", () => deleteEvent(event.id));
    eventList.append(node);
  });
}

function saveEvent(event) {
  event.preventDefault();
  normalizeTimeField(eventStartTime);
  normalizeTimeField(eventEndTime);
  const title = eventTitle.value.trim();
  if (!title) return;

  const payload = {
    id: editingId.value || createId(),
    date: selectedDate,
    title,
    startTime: eventAllDay.checked ? "" : eventStartTime.value,
    endTime: eventAllDay.checked ? "" : eventEndTime.value,
    allDay: eventAllDay.checked,
    notes: eventNotes.value.trim(),
    updatedAt: new Date().toISOString(),
  };

  const wasEditing = Boolean(editingId.value);
  if (wasEditing) {
    events = events.map((item) => (item.id === editingId.value ? payload : item));
  } else {
    events.push(payload);
  }

  persistEvents();
  resetForm();
  render();
  showEventsView();
  showToast(wasEditing ? "活動已更新" : "活動已儲存");
}

function editEvent(id) {
  const event = events.find((item) => item.id === id);
  if (!event) return;
  editingId.value = event.id;
  eventTitle.value = event.title;
  eventStartTime.value = event.startTime || event.time || "";
  eventEndTime.value = event.endTime || "";
  eventAllDay.checked = Boolean(event.allDay);
  eventNotes.value = event.notes;
  syncAllDayFields();
  showFormView();
  formTitle.textContent = "編輯活動";
  saveButton.textContent = "更新活動";
  cancelEditButton.hidden = false;
  eventTitle.focus();
  showToast("正在編輯活動");
}

function deleteEvent(id) {
  const event = events.find((item) => item.id === id);
  if (!event) return;
  const ok = window.confirm(`確定要刪除「${event.title}」嗎？`);
  if (!ok) return;
  events = events.filter((item) => item.id !== id);
  persistEvents();
  resetForm();
  render();
  showToast("活動已刪除");
}

function resetForm() {
  editingId.value = "";
  eventForm.reset();
  eventAllDay.checked = false;
  syncAllDayFields();
  formTitle.textContent = "新增活動";
  saveButton.textContent = "儲存活動";
  cancelEditButton.hidden = true;
}

function exportBackup() {
  const blob = new Blob([JSON.stringify(events, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const anchor = document.createElement("a");
  anchor.href = url;
  anchor.download = `自用日曆備份-${toDateKey(new Date())}.json`;
  anchor.click();
  URL.revokeObjectURL(url);
  showToast("已下載備份檔");
}

function focusNewEvent() {
  openDetail();
  resetForm();
  showFormView();
  eventTitle.focus();
}

function showEventsView() {
  formPanel.hidden = true;
  eventsPanel.hidden = false;
}

function showFormView() {
  formPanel.hidden = false;
  eventsPanel.hidden = true;
}

function syncAllDayFields() {
  const disabled = eventAllDay.checked;
  eventStartTime.disabled = disabled;
  eventEndTime.disabled = disabled;
  if (disabled) {
    eventStartTime.value = "";
    eventEndTime.value = "";
  }
}

function normalizeTimeField(input) {
  if (input.disabled) return;
  const original = input.value.trim();
  const normalized = parseTimeText(input.value);
  input.value = normalized;
  if (original && !normalized) {
    showToast("時間格式請輸入 0930 或 09:30");
  }
}

function parseTimeText(value) {
  const text = value.trim();
  if (!text) return "";
  const digits = text.replace(/\D/g, "");
  if (digits.length < 3 || digits.length > 4) return "";
  const padded = digits.padStart(4, "0");
  const hour = Number(padded.slice(0, 2));
  const minute = Number(padded.slice(2, 4));
  if (hour > 23 || minute > 59) return "";
  return `${pad(hour)}:${pad(minute)}`;
}

function handleShortcuts(event) {
  if (event.key === "Escape" && editingId.value) {
    resetForm();
    showToast("已取消編輯");
    return;
  }
  if (event.key === "Escape" && detailPanel.classList.contains("is-open")) {
    closeDetail();
  }
}

function openDetail() {
  detailPanel.classList.add("is-open");
  detailPanel.setAttribute("aria-hidden", "false");
  document.body.classList.add("modal-open");
  showEventsView();
}

function closeDetail() {
  detailPanel.classList.remove("is-open");
  detailPanel.setAttribute("aria-hidden", "true");
  document.body.classList.remove("modal-open");
  resetForm();
  showEventsView();
}

function handleOverlayClick(event) {
  if (event.target === detailPanel) {
    closeDetail();
  }
}

let toastTimer;
function showToast(message) {
  toast.textContent = message;
  toast.classList.add("is-visible");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => {
    toast.classList.remove("is-visible");
  }, 1800);
}

function createId() {
  if (window.crypto && typeof window.crypto.randomUUID === "function") {
    return window.crypto.randomUUID();
  }
  return `event-${Date.now()}-${Math.random().toString(36).slice(2)}`;
}

function getEventsForDate(dateKey) {
  return events
    .filter((event) => event.date === dateKey)
    .sort((a, b) => {
      const aTime = a.allDay ? "00:00" : a.startTime || a.time || "99:99";
      const bTime = b.allDay ? "00:00" : b.startTime || b.time || "99:99";
      return aTime.localeCompare(bTime);
    });
}

function toDateKey(date) {
  const year = date.getFullYear();
  const month = pad(date.getMonth() + 1);
  const day = pad(date.getDate());
  return `${year}-${month}-${day}`;
}

function pad(value) {
  return String(value).padStart(2, "0");
}

function formatFullDate(dateKey) {
  const [year, month, day] = dateKey.split("-").map(Number);
  const date = new Date(year, month - 1, day);
  const weekday = ["星期日", "星期一", "星期二", "星期三", "星期四", "星期五", "星期六"][date.getDay()];
  return `${year} 年 ${month} 月 ${day} 日 ${weekday}`;
}

function formatShortDate(dateKey) {
  const [year, month, day] = dateKey.split("-").map(Number);
  return `${year}/${month}/${day}`;
}

function formatEventTime(event) {
  if (event.allDay) return "整天";
  const start = event.startTime || event.time || "";
  const end = event.endTime || "";
  if (start && end) return `${start} - ${end}`;
  if (start) return start;
  if (end) return `到 ${end}`;
  return "未設定時間";
}

  </script>
</body>
